<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studietur Amsterdam · Check-in</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <h1>Studietur Amsterdam · Check-in</h1>
        <div class="meta" id="meta">MDU-E25IXD</div>
        <div class="trip-controls" role="tablist" aria-label="Vælg rejse">
          <button id="tripOutbound" class="trip-btn active" type="button" role="tab" aria-selected="true">
            Udrejse 23/3
          </button>
          <button id="tripReturn" class="trip-btn" type="button" role="tab" aria-selected="false">
            Hjemrejse 27/3
          </button>
        </div>
        <div class="controls">
          <input id="search" type="search" placeholder="Søg efter navn..." />
        </div>
      </div>

      <div id="list" class="list"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
